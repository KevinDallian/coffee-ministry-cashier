<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashier — Order Entry</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent-dim: #8a7049;
    --text: #f0ece4;
    --text-muted: #8a8680;
    --danger: #e05252;
    --success: #52b788;
    --pending: #e0a040;
    --ready: #52b788;
    --done: #555;
    --radius: 10px;

    /* Category colors */
    --cat-coffee: #c8a96e;
    --cat-tea:    #6ec88a;
    --cat-food:   #e07b52;
    --cat-cold:   #52a8de;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  header .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
  }
  header .spacer { flex: 1; }
  header .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s;
  }
  header .conn-dot.connected { background: var(--success); }
  header .conn-label { font-size: 12px; color: var(--text-muted); }

  /* ── Menu Panel ── */
  #menu-panel {
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Category section header */
  .category-section { display: flex; flex-direction: column; gap: 8px; }

  .category-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding: 6px 10px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  /* Per-category colors */
  .category-label[data-cat="Coffee"] { color: var(--cat-coffee); border-bottom: 2px solid var(--cat-coffee); background: rgba(200,169,110,0.07); }
  .category-label[data-cat="Tea"]    { color: var(--cat-tea);    border-bottom: 2px solid var(--cat-tea);    background: rgba(110,200,138,0.07); }
  .category-label[data-cat="Food"]   { color: var(--cat-food);   border-bottom: 2px solid var(--cat-food);   background: rgba(224,123,82,0.07); }
  .category-label[data-cat="Cold"]   { color: var(--cat-cold);   border-bottom: 2px solid var(--cat-cold);   background: rgba(82,168,222,0.07); }
  /* Fallback for custom categories */
  .category-label[data-cat] { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(200,169,110,0.07); }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .menu-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }
  .menu-item:hover { background: var(--surface2); }
  .menu-item:active { transform: scale(0.97); }
  /* Tinted hover border per category */
  .menu-item[data-cat="Coffee"]:hover { border-color: var(--cat-coffee); }
  .menu-item[data-cat="Tea"]:hover    { border-color: var(--cat-tea); }
  .menu-item[data-cat="Food"]:hover   { border-color: var(--cat-food); }
  .menu-item[data-cat="Cold"]:hover   { border-color: var(--cat-cold); }

  .menu-item .item-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
  }

  /* ── Order Panel ── */
  #order-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .order-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .order-header h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  /* Customer name input */
  .customer-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .customer-row label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .customer-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .customer-input:focus { border-color: var(--accent-dim); }
  .customer-input::placeholder { color: var(--text-muted); font-weight: 400; }

  #order-items {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .order-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .order-row .row-name { flex: 1; font-size: 13px; }
  .order-row .row-qty { display: flex; align-items: center; gap: 4px; }
  .qty-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
  .row-del { cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 4px; transition: color 0.15s; }
  .row-del:hover { color: var(--danger); }

  .order-empty {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    margin-top: 40px;
  }

  /* Recent strip */
  #recent-strip {
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    min-height: 40px;
    align-items: center;
  }
  #recent-strip::-webkit-scrollbar { display: none; }
  #recent-strip:empty { display: none; }
  .recent-chip {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 9px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .recent-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
  .chip-dot.pending { background: var(--pending); }
  .chip-dot.ready   { background: var(--ready); }
  .chip-dot.done    { background: var(--done); }

  .order-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .note-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .note-input:focus { border-color: var(--accent-dim); }
  .note-input::placeholder { color: var(--text-muted); }

  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    flex: 0 0 auto;
    padding: 13px 16px;
  }
  .btn-clear:hover { color: var(--danger); border-color: var(--danger); }
  .btn-submit { background: var(--accent); color: #0f0f0f; }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>☕ Café POS</h1>
  <span class="badge">Cashier</span>
  <div class="spacer"></div>
  <div class="conn-dot" id="conn-dot"></div>
  <span class="conn-label" id="conn-label">Connecting…</span>
</header>

<div id="menu-panel"></div>

<div id="order-panel">
  <div class="order-header">
    <h2>Current Order</h2>
  </div>

  <div class="customer-row">
    <label>👤 Name:</label>
    <input class="customer-input" id="customer-name" type="text" placeholder="Customer name" autocomplete="off" />
  </div>

  <div id="order-items">
    <p class="order-empty">Tap items from the menu to add them</p>
  </div>

  <div id="recent-strip"></div>

  <div class="order-footer">
    <textarea class="note-input" id="note-input" rows="2" placeholder="Note (e.g. no sugar, extra shot…)"></textarea>
    <div class="btn-row">
      <button class="btn btn-clear" id="clear-btn">✕ Clear</button>
      <button class="btn btn-submit" id="submit-btn" disabled>Place Order</button>
    </div>
  </div>
</div>

<div id="toast">Order placed!</div>

<script>
  const socket = io();
  let menu = [];
  let cart = [];
  let orders = [];

  socket.on("connect", () => setConn(true));
  socket.on("disconnect", () => setConn(false));
  function setConn(ok) {
    document.getElementById("conn-dot").className = "conn-dot" + (ok ? " connected" : "");
    document.getElementById("conn-label").textContent = ok ? "Live" : "Offline";
  }

  socket.on("init", (data) => { menu = data.menu; orders = data.orders; renderMenu(); renderRecent(); });
  socket.on("order_added",   (o) => { orders.unshift(o); renderRecent(); });
  socket.on("order_updated", (o) => { const i = orders.findIndex(x => x.id === o.id); if (i !== -1) { orders[i] = o; renderRecent(); } });
  socket.on("order_deleted", ({ orderId }) => { orders = orders.filter(o => o.id !== orderId); renderRecent(); });
  socket.on("orders_cleared", ({ orders: o }) => { orders = o; renderRecent(); });

  // Category emoji map
  const CAT_EMOJI = { Hot: "☕", Ice: "🧊" , Kids: "👶"};

  function renderMenu() {
    const panel = document.getElementById("menu-panel");
    panel.innerHTML = "";
    const cats = [...new Set(menu.map(m => m.category))];
    cats.forEach(cat => {
      console.log(cat);
      const items = menu.filter(m => m.category === cat);
      const section = document.createElement("div");
      section.className = "category-section";
      const label = document.createElement("div");
      label.className = "category-label";
      label.setAttribute("data-cat", cat);
      label.textContent = (CAT_EMOJI[cat] || "🍽") + " " + cat;
      const grid = document.createElement("div");
      grid.className = "menu-grid";
      items.forEach(item => {
        const el = document.createElement("div");
        el.className = "menu-item";
        el.setAttribute("data-cat", cat);
        el.innerHTML = `<div class="item-name">${item.name}</div>`;
        el.addEventListener("click", () => addToCart(item));
        grid.appendChild(el);
      });
      section.appendChild(label);
      section.appendChild(grid);
      panel.appendChild(section);
    });
  }

  function addToCart(item) {
    const existing = cart.find(c => c.id === item.id);
    if (existing) existing.qty++;
    else cart.push({ ...item, qty: 1 });
    renderCart();
  }

  function changeQty(id, delta) {
    const item = cart.find(c => c.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
    renderCart();
  }

  function removeFromCart(id) {
    cart = cart.filter(c => c.id !== id);
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById("order-items");
    const submitBtn = document.getElementById("submit-btn");

    if (cart.length === 0) {
      container.innerHTML = `<p class="order-empty">Tap items from the menu to add them</p>`;
      submitBtn.disabled = true;
      return;
    }

    container.innerHTML = "";
    cart.forEach(item => {
      const row = document.createElement("div");
      row.className = "order-row";
      row.innerHTML = `
        <span class="row-name">${item.name}</span>
        <div class="row-qty">
          <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
        <span class="row-del" onclick="removeFromCart('${item.id}')">✕</span>
      `;
      container.appendChild(row);
    });
    submitBtn.disabled = false;
  }

  document.getElementById("submit-btn").addEventListener("click", () => {
    if (cart.length === 0) return;
    const customerName = document.getElementById("customer-name").value.trim() || "Guest";
    socket.emit("new_order", {
      tableLabel: customerName,
      customerName,
      items: cart.map(c => ({ id: c.id, name: c.name, price: c.price || 0, qty: c.qty })),
      total: 0,
      note: document.getElementById("note-input").value.trim()
    });
    cart = [];
    document.getElementById("customer-name").value = "";
    document.getElementById("note-input").value = "";
    document.getElementById("customer-name").focus();
    renderCart();
    showToast("Order placed!");
  });

  document.getElementById("clear-btn").addEventListener("click", () => {
    cart = [];
    document.getElementById("note-input").value = "";
    renderCart();
  });

  function renderRecent() {
    const strip = document.getElementById("recent-strip");
    const recent = orders.filter(o => o.status !== "done").slice(0, 10);
    strip.innerHTML = recent.map(o => `
      <div class="recent-chip">
        <span class="chip-dot ${o.status}"></span>
        <span>${o.customerName || o.tableLabel}</span>
      </div>
    `).join("");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }
</script>
</body>
</html>
